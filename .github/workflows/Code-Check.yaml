name: Android Pull Request Check

on:
  pull_request:
    branches: [ "main" ]
    types: [opened, synchronize, reopened]
  workflow_dispatch:

# 同一PRで新しいコミットがプッシュされたら、古い実行を自動キャンセルしてリソースを節約する
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    # JUnitレポート作成などのために書き込み権限を付与
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    # Gradleのセットアップとキャッシュ管理（setup-javaのcacheより高性能）
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # テストとビルドをまとめて実行（効率化）
    # --stacktrace: エラー時の詳細確認用
    # --no-daemon: CI環境ではデーモン不要
    - name: Run Tests and Build Check
      run: ./gradlew testDebugUnitTest assembleDebug --stacktrace --no-daemon

    # テスト結果の可視化（PRのChecksタブに結果を表示）
    - name: Publish Test Report
      uses: mikepenz/action-junit-report@v4
      if: always()
      with:
        report_paths: '**/build/test-results/testDebugUnitTest/*.xml'
        detailed_summary: true
        include_passed_tests: true

    # 失敗時のみ、デバッグに役立つ成果物をアップロード
    - name: Upload Test Results on Failure
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: test-results
        path: |
          **/build/test-results/testDebugUnitTest/
          **/build/reports/tests/testDebugUnitTest/