name: Android Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew assembleDebug

    - name: Set build date
      run: echo "BUILD_DATE=$(date +'%Y%m%d_%H%M%S')" >> $GITHUB_ENV

    - name: Rename APK
      run: mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/app-debug_${{ env.BUILD_DATE }}.apk

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug_${{ env.BUILD_DATE }}
        path: app/build/outputs/apk/debug/app-debug_${{ env.BUILD_DATE }}.apk
        retention-days: 1
